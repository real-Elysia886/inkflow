name: "Editor"
description: "编辑：负责章节质量评估、问题诊断、润色建议"
system_prompt: "prompt.md"
few_shots: "samples.json"
output_schema:
  type: "object"
  properties:
    style_score: {type: "integer"}
    logic_score: {type: "integer"}
    character_score: {type: "integer"}
    pacing_score: {type: "integer"}
    dialogue_score: {type: "integer"}
    description_score: {type: "integer"}
    foreshadowing_score: {type: "integer"}
    total_score: {type: "integer"}
    pass: {type: "boolean"}
    issues: {type: "array"}
    highlights: {type: "array"}
    rewrite_instructions: {type: "string"}
