providers:
  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
default:
  provider: deepseek
  model_name: deepseek-chat
  temperature: 0.7
  max_tokens: 4096
role_routing:
  prophet:
    provider: deepseek
    model_name: deepseek-chat
    temperature: 0.4
    max_tokens: 8000
  writer:
    provider: deepseek
    model_name: deepseek-chat
    temperature: 0.9
    max_tokens: 8000
  librarian:
    provider: deepseek
    model_name: deepseek-chat
    temperature: 0.3
    max_tokens: 8000
  strategist:
    provider: deepseek
    model_name: deepseek-chat
    temperature: 0.7
    max_tokens: 8000
  editor:
    provider: deepseek
    model_name: deepseek-chat
    temperature: 0.7
    max_tokens: 8000
